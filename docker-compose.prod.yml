# docker-compose.prod.yml
services:
  db:
    image: us-central1-docker.pkg.dev/${GOOGLE_CLOUD_PROJECT}/perfinanzas-repo/db:latest
    container_name: credit_analysis_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: credit_analysis_db
    # Eliminados los ports para no exponer la BD local de la VM hacia internet
    volumes:
      - credit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d credit_analysis_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: us-central1-docker.pkg.dev/${GOOGLE_CLOUD_PROJECT}/perfinanzas-repo/backend:latest
    container_name: credit_analysis_api
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    # IMPORTANTE: Eliminados los volumes ./backend:/app para proteger el código fuente
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: us-central1-docker.pkg.dev/${GOOGLE_CLOUD_PROJECT}/perfinanzas-repo/frontend:latest
    container_name: credit_analysis_frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      INTERNAL_API_URL: http://backend:8000
    depends_on:
      - backend
    # IMPORTANTE: Eliminados los volumes ./frontend:/app

volumes:
  credit_pgdata: